<?xml version="1.0" encoding="UTF-8"?>
<svg width="406" height="120" viewBox="0 0 406 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6A3CFF"/>
      <stop offset="100%" stop-color="#B388FF"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="406" height="120" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="406" height="120" rx="22" fill="url(#glass)"/>

  <circle cx="320" cy="-40" r="120" fill="white" opacity="0.08"/>

  <g transform="translate(24,32)">
    <circle cx="20" cy="20" r="20" fill="white" opacity="0.2"/>
    <circle cx="20" cy="20" r="16" fill="white"/>
    <path d="M12 20h16M12 24h10" stroke="#6A3CFF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="80" y="46" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" opacity="0.85">
    Monthly installment
  </text>

  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">
